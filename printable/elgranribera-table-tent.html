<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 384px;
    height: 576px;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #B5605A;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(0,0,0,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Logo: top center */
  .logo {
    position: absolute;
    top: 22px;
    left: 50%; transform: translateX(-50%);
    max-width: 150px;
    max-height: 44px;
    object-fit: contain;
  }

  /* Label */
  .label {
    position: absolute;
    top: 76px;
    width: 100%;
    text-align: center;
    font-size: 5.5px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .label::before, .label::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 0.7px;
    background: rgba(255,255,255,0.18);
    vertical-align: middle;
    margin: 0 7px;
  }

  /* CTA */
  .cta {
    position: absolute;
    top: 96px;
    width: 100%;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 17px;
    line-height: 1.28;
    color: white;
    letter-spacing: -0.2px;
  }
  .cta em { font-style: italic; font-weight: 600; opacity: 0.9; }

  /* QR card — centered vertically in the middle zone */
  .qr-card {
    position: absolute;
    top: 192px;
    left: 50%; transform: translateX(-50%);
    background: white;
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.14), 0 2px 6px rgba(0,0,0,0.07);
  }
  .qr-card img {
    display: block;
    width: 178px;
    height: 178px;
  }

  /* Scan hint */
  .scan-hint {
    position: absolute;
    top: 404px;
    width: 100%;
    text-align: center;
  }
  .scan-hint span {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 6px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .scan-hint svg { width: 9px; height: 9px; opacity: 0.4; }

  /* Benefits */
  .benefits {
    position: absolute;
    top: 430px;
    left: 30px;
    right: 30px;
  }
  .benefit {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .benefit-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    flex-shrink: 0;
  }
  .benefit span {
    font-size: 7.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    padding: 7px 24px;
    text-align: center;
    border-top: 0.6px solid rgba(255,255,255,0.08);
  }
  .footer p {
    font-size: 5.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
</style>
</head>
